name: build-container

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: dfguard

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Configure devenv cache
        run: echo '{ cachix.push = "m00nwtchr"; }' > devenv.local.nix

      - name: Configure Cachix
        uses: cachix/cachix-action@v16
        with:
          name: m00nwtchr
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Build container
        run: |
          devenv container copy \
            --registry "docker-daemon:" \
            prod

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish rolling tag
        run: |
          docker tag "${{ env.IMAGE_NAME }}:latest" "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:rolling"
          docker push "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:rolling"

      - name: Publish latest tag
        run: |
          docker tag "${{ env.IMAGE_NAME }}:latest" "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          docker push "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:rolling"
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
